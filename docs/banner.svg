<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="phpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a86b8"/>
      <stop offset="100%" style="stop-color:#4f5b93"/>
    </linearGradient>
    <linearGradient id="revoltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e76f51"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="mongoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4db33d"/>
      <stop offset="100%" style="stop-color:#3d8b30"/>
    </linearGradient>
    <linearGradient id="bsonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c89a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#ffffff" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Connecting arrows between components -->
  <!-- PHP → Revolt -->
  <path d="M 168 100 L 218 100" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3" fill="none" marker-end="url(#arrow)"/>
  <!-- Revolt → MongoDB -->
  <path d="M 368 100 L 418 100" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3" fill="none" marker-end="url(#arrow)"/>
  <!-- MongoDB → BSON -->
  <path d="M 568 100 L 618 100" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3" fill="none" marker-end="url(#arrow)"/>

  <!-- PHP Block -->
  <g transform="translate(20, 50)">
    <rect width="130" height="100" rx="10" fill="url(#phpGrad)" opacity="0.85"/>
    <!-- PHP elephant outline simplified -->
    <text x="65" y="38" font-family="monospace" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">&lt;?php</text>
    <text x="65" y="65" font-family="sans-serif" font-size="13" fill="#d0d8f0" text-anchor="middle">PHP 8.4+</text>
    <text x="65" y="85" font-family="sans-serif" font-size="10" fill="#b0bbdd" text-anchor="middle">Userland Driver</text>
  </g>

  <!-- RevoltPHP Block -->
  <g transform="translate(220, 50)">
    <rect width="130" height="100" rx="10" fill="url(#revoltGrad)" opacity="0.85"/>
    <!-- Lightning bolt -->
    <text x="65" y="40" font-family="sans-serif" font-size="26" fill="#ffffff" text-anchor="middle" filter="url(#glow)">⚡</text>
    <text x="65" y="65" font-family="sans-serif" font-size="13" fill="#fde8e0" text-anchor="middle">RevoltPHP</text>
    <text x="65" y="85" font-family="sans-serif" font-size="10" fill="#f5c5b5" text-anchor="middle">Async I/O · Fibers</text>
  </g>

  <!-- MongoDB Block -->
  <g transform="translate(420, 50)">
    <rect width="130" height="100" rx="10" fill="url(#mongoGrad)" opacity="0.85"/>
    <!-- Leaf shape simplified -->
    <text x="65" y="40" font-family="sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" filter="url(#glow)">🍃</text>
    <text x="65" y="65" font-family="sans-serif" font-size="13" fill="#d0f0c8" text-anchor="middle">MongoDB</text>
    <text x="65" y="85" font-family="sans-serif" font-size="10" fill="#b0e0a8" text-anchor="middle">Wire Protocol</text>
  </g>

  <!-- BSON Block -->
  <g transform="translate(620, 50)">
    <rect width="130" height="100" rx="10" fill="url(#bsonGrad)" opacity="0.85"/>
    <!-- Binary brackets -->
    <text x="65" y="40" font-family="monospace" font-size="22" font-weight="bold" fill="#3d2800" text-anchor="middle" filter="url(#glow)">{  }</text>
    <text x="65" y="65" font-family="sans-serif" font-size="13" fill="#3d2800" text-anchor="middle" font-weight="bold">BSON</text>
    <text x="65" y="85" font-family="sans-serif" font-size="10" fill="#5a3c00" text-anchor="middle">18 Types · Encoder</text>
  </g>

  <!-- Title at the bottom -->
  <text x="400" y="178" font-family="sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="1">mongodb-driver-revoltphp — drop-in MongoDB driver, no C extension required</text>
</svg>
