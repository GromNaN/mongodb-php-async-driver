; PHP INI overrides for the test suite.
;
; This directory is set as PHP_INI_SCAN_DIR when running phpt tests so that:
;  - ext-mongodb is not loaded (the scan dir replaces the default one, which
;    may contain a mongodb.ini that loads the extension)
;  - OPcache is enabled for the CLI with file-based storage so that repeated
;    test runs benefit from bytecode caching

memory_limit=512M

; Enable OPcache for CLI
opcache.enable_cli=1
opcache.file_cache=/tmp/opcache-mongodb-driver-tests
opcache.file_cache_only=0
opcache.validate_timestamps=1
opcache.revalidate_freq=0
